name: Java CI with Gradle

on:
  push:
    paths-ignore:
      - '*.md'
      - '*.txt'
  pull_request:
    paths-ignore:
      - '*.md'
      - '*.txt'
  workflow_dispatch:

jobs:
  build-forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21

      - name: Build (Forge)
        run: ./gradlew build

      - uses: actions/upload-artifact@v6
        with:
          name: MouseTweaks-Forge
          path: build/libs/
          if-no-files-found: error

  build-neoforge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21

      - name: Build (NeoForge)
        run: ./gradlew --build-file build-neoforge.gradle build

      - uses: actions/upload-artifact@v6
        with:
          name: MouseTweaks-NeoForge
          path: build/libs/
          if-no-files-found: error

  build-fabric:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21

      - name: Build (Fabric)
        run: ./gradlew --build-file build-fabric.gradle build

      - uses: actions/upload-artifact@v6
        with:
          name: MouseTweaks-Fabric
          path: build/libs/
          if-no-files-found: error
